<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Living Dex</title>
<meta name="theme-color" content="#C42B2B" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Living Dex" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap');

:root{--p:#C42B2B;--pd:#8E1F1F;--s:#FFD700;--bg:#F5F0E8;--sur:#FFFFFF;--ink:#1A1A2E;--soft:#6B6B7A;--acc:#FBEAEA;--line:rgba(26,26,46,0.12)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body{padding-bottom:env(safe-area-inset-bottom);transition:background .4s}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}

.app{max-width:900px;margin:0 auto;padding:0 16px 32px}

.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:40}
.sidebar-overlay.open{display:block}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;max-width:85vw;background:var(--bg);border-right:1px solid var(--line);padding:calc(env(safe-area-inset-top)+16px) 0 20px;overflow-y:auto;z-index:41;transform:translateX(-110%);transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:4px 0 24px rgba(0,0,0,.12)}
.sidebar.open{transform:translateX(0)}
.sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:0 14px 12px;border-bottom:1px solid var(--line);margin-bottom:8px}
.sidebar-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--soft);margin:0}
.sidebar-close{display:flex;align-items:center;justify-content:center;width:28px;height:28px;background:transparent;border:none;color:var(--soft);padding:0;cursor:pointer}
.sidebar-close svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.gen-stat{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;border-radius:8px;margin:2px 8px;cursor:pointer;transition:background .15s}
.gen-stat:hover,.gen-stat.active{background:var(--acc)}
.gen-stat.active .gen-stat-label{color:var(--p);font-weight:600}
.gen-stat-label{font-size:12px;font-weight:500;color:var(--ink)}
.gen-stat-nums{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--soft)}
.gen-stat-bar{height:3px;border-radius:2px;background:var(--line);margin:2px 14px 6px;overflow:hidden}
.gen-stat-bar-fill{height:100%;background:var(--p);border-radius:2px;transition:width .4s}
.sidebar-total{padding:10px 14px 6px;border-top:1px solid var(--line);margin-top:8px}
.sidebar-total-label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--soft);font-weight:600}
.sidebar-total-val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--ink);margin-top:2px}

.app-header{position:sticky;top:0;z-index:20;background:var(--bg);padding:calc(env(safe-area-inset-top)+12px) 0 10px;transition:background .4s}
.header-top{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.icon-btn{width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:transparent;border:1px solid var(--line);border-radius:10px;color:var(--ink);flex-shrink:0;cursor:pointer}
.icon-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.icon-btn:active{transform:scale(.94)}
.app-title{display:flex;align-items:center;gap:10px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;margin:0;color:var(--ink);flex:1}
.title-ball{width:22px;height:22px;border-radius:50%;background:linear-gradient(180deg,var(--p) 0%,var(--p) 48%,var(--ink) 48%,var(--ink) 52%,#fff 52%,#fff 100%);border:2px solid var(--ink);position:relative;flex-shrink:0}
.title-ball::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;border-radius:50%;background:#fff;border:1.5px solid var(--ink)}
.progress-row{display:flex;gap:10px;margin-bottom:10px}
.progress-stat{flex:1;background:var(--sur);border:1px solid var(--line);border-radius:12px;padding:10px 14px;display:flex;flex-direction:column;gap:2px}
.progress-stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--soft);font-weight:600}
.progress-stat-value{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--ink)}
.progress-stat-shiny .progress-stat-value{color:var(--pd)}
.progress-bar-track{height:6px;border-radius:4px;background:var(--line);overflow:hidden}
.progress-bar-fill{height:100%;background:var(--p);border-radius:4px;width:0%;transition:width .5s cubic-bezier(.4,0,.2,1)}

.controls-row{display:flex;gap:8px;margin:14px 0 10px;flex-wrap:wrap}
.search-wrap{flex:1;min-width:180px;position:relative;display:flex;align-items:center}
.search-icon{position:absolute;left:12px;pointer-events:none;color:var(--soft)}
.search-icon svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#searchInput{width:100%;height:40px;border-radius:10px;border:1px solid var(--line);background:var(--sur);padding:0 12px 0 36px;font-size:15px;color:var(--ink);outline:none}
#searchInput:focus{border-color:var(--p);box-shadow:0 0 0 3px var(--acc)}
#searchInput::-webkit-search-cancel-button{-webkit-appearance:none}
.filter-toggle{display:flex;align-items:center;gap:6px;height:40px;padding:0 14px;border-radius:10px;border:1px solid var(--line);background:var(--sur);color:var(--ink);font-size:14px;font-weight:500;white-space:nowrap;flex-shrink:0}
.filter-toggle svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.filter-toggle[aria-pressed="true"]{background:var(--p);border-color:var(--p);color:#fff}

.toggles-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.toggle-pill{display:flex;align-items:center;gap:5px;height:32px;padding:0 12px;border-radius:999px;border:1px solid var(--line);background:var(--sur);color:var(--soft);font-size:12px;font-weight:600;white-space:nowrap;transition:all .15s;cursor:pointer}
.toggle-pill svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.toggle-pill.on{background:var(--p);border-color:var(--p);color:#fff}

.gen-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;margin-bottom:6px;scrollbar-width:none}
.gen-tabs::-webkit-scrollbar{display:none}
.gen-tab{flex-shrink:0;padding:7px 13px;border-radius:999px;border:1px solid var(--line);background:var(--sur);color:var(--soft);font-size:13px;font-weight:600;font-family:'JetBrains Mono',monospace;white-space:nowrap;cursor:pointer}
.gen-tab.active{background:var(--p);border-color:var(--p);color:#fff}

.dex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.empty-state{text-align:center;padding:60px 20px;color:var(--soft);font-size:14px}
.empty-state svg{display:block;margin:0 auto 10px;width:32px;height:32px;stroke:currentColor;fill:none;stroke-width:1.5}

.dex-card{background:var(--sur);border:1px solid var(--line);border-radius:14px;padding:8px 8px 10px;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;transition:transform .15s,border-color .2s;width:100%;cursor:pointer}
.dex-card:active{transform:scale(.96)}
.dex-card.complete{border-color:var(--p);background:var(--acc)}
.dex-card-num{position:absolute;top:7px;left:9px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--soft);font-weight:500}
.dex-card-name{font-size:12px;font-weight:500;color:var(--ink);margin:3px 0 5px;line-height:1.25}
.dex-card-progress{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--soft);background:var(--bg);border-radius:999px;padding:2px 7px}
.dex-card.complete .dex-card-progress{color:var(--pd);background:#fff}
.dex-card-sprites{display:flex;gap:4px;margin:18px 0 2px;align-items:center;justify-content:center}
.sprite-slot{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1}
.sprite-slot img{width:52px;height:52px;object-fit:contain;image-rendering:pixelated}
.sprite-slot img.uncaught{filter:brightness(0) opacity(.14)}
.sprite-slot-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--soft)}
.sprite-divider{width:1px;height:40px;background:var(--line);flex-shrink:0}

.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;display:flex;justify-content:flex-end}
.menu-panel{width:min(320px,86vw);height:100%;background:var(--bg);padding:calc(env(safe-area-inset-top)+20px) 20px 20px;overflow-y:auto;animation:slideIn .25s cubic-bezier(.4,0,.2,1)}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.menu-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.menu-panel-header h2{font-family:'Space Grotesk',sans-serif;font-size:18px;margin:0}
.menu-section{margin-bottom:24px}
.menu-section-title{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--soft);font-weight:600;margin:0 0 10px}
.menu-action{width:100%;display:flex;align-items:center;gap:12px;background:var(--sur);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;text-align:left;color:var(--ink);cursor:pointer}
.menu-action svg{width:18px;height:18px;stroke:var(--p);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.menu-action-text{display:flex;flex-direction:column;gap:1px}
.menu-action-text span:first-child{font-size:14px;font-weight:500}
.menu-action-sub{font-size:12px;color:var(--soft)}
.menu-action-danger svg{stroke:#C42B2B}
.menu-action-danger span:first-child{color:#C42B2B}
.menu-toggle{display:flex;align-items:center;justify-content:space-between;background:var(--sur);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;font-size:14px;cursor:pointer}
.menu-toggle input{position:absolute;opacity:0;pointer-events:none}
.toggle-track{width:40px;height:24px;border-radius:999px;background:var(--line);position:relative;flex-shrink:0;transition:background .2s}
.toggle-track::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.menu-toggle input:checked+.toggle-track{background:var(--p)}
.menu-toggle input:checked+.toggle-track::after{transform:translateX(16px)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:60;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:600px){.modal-overlay{align-items:center}}
.modal{width:100%;max-width:560px;max-height:86vh;background:var(--bg);border-radius:20px 20px 0 0;padding:20px 18px calc(env(safe-area-inset-bottom)+20px);overflow-y:auto;position:relative;animation:slideUp .25s cubic-bezier(.4,0,.2,1)}
@media(min-width:600px){.modal{border-radius:20px;max-height:80vh}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-close{position:absolute;top:14px;right:14px}
.modal-header{display:flex;align-items:center;gap:14px;margin-bottom:18px;padding-right:40px}
.modal-sprites{display:flex;gap:8px;flex-shrink:0}
.modal-sprite-slot{display:flex;flex-direction:column;align-items:center;gap:3px}
.modal-sprite-slot img{width:56px;height:56px;object-fit:contain;image-rendering:pixelated}
.modal-sprite-slot img.uncaught{filter:brightness(0) opacity(.14)}
.modal-sprite-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--soft)}
.modal-dexnum{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--soft);font-weight:600;display:block}
.modal-title{font-family:'Space Grotesk',sans-serif;font-size:19px;margin:1px 0}
.modal-progress{font-size:12px;color:var(--soft);font-family:'JetBrains Mono',monospace}
.modal-forms{display:flex;flex-direction:column;gap:8px}
.form-row{display:flex;align-items:center;gap:12px;background:var(--sur);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
.form-row-info{flex:1;min-widt
